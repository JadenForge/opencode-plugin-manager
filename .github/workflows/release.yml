name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            runner: macos-latest
            target: aarch64-apple-darwin
            bundles: app,dmg,updater
          - name: Windows x64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: nsis,updater

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build frontend
        run: bun run build

      - name: Verify updater signing key
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "${TAURI_SIGNING_PRIVATE_KEY}" ]; then
            echo "TAURI_SIGNING_PRIVATE_KEY GitHub secret is required for updater artifacts." >&2
            exit 1
          fi

          if ! printf '%s' "${TAURI_SIGNING_PRIVATE_KEY}" | base64 --decode >/dev/null 2>&1; then
            echo "TAURI_SIGNING_PRIVATE_KEY must contain the base64 private key generated by 'bun tauri signer generate'." >&2
            echo "Do not store the 'untrusted comment:' wrapper or public key in this secret." >&2
            exit 1
          fi

      - name: Build Tauri app and upload release assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: ${{ github.ref_name }}
          releaseBody: |
            Includes macOS Apple Silicon and Windows x64 installers.
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

      - name: Upload updater artifacts
        uses: actions/upload-artifact@v4
        with:
          name: updater-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.tar.gz
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.tar.gz.sig
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.zip
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.zip.sig
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe.sig
          if-no-files-found: error
          retention-days: 1

  publish-manifest:
    name: Publish latest.json
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Download updater artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloads
          pattern: updater-*
          merge-multiple: false

      - name: Generate latest.json
        run: |
          bun scripts/generate-latest-json.ts \
            --version "${GITHUB_REF_NAME#v}" \
            --downloads downloads \
            --out latest.json

      - name: Verify latest.json shape
        run: |
          test -f latest.json
          jq -e '.version and .platforms["darwin-aarch64"] and .platforms["windows-x86_64"]' latest.json

      - name: Upload latest.json to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${GITHUB_REF_NAME}" latest.json --clobber
